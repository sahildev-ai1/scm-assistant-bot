services:
  - type: web
    name: scm-assistant
    runtime: python
    plan: free            # 512 MB RAM
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: OLLAMA_API_KEY
        sync: false        # set manually in Render dashboard
      - key: QDRANT_URL
        sync: false        # e.g. https://xxxx.qdrant.io:6333
      - key: QDRANT_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: nomic-embed-text
      - key: CHAT_MODEL
        value: llama3.2
      - key: PYTHON_VERSION
        value: "3.11.0"
