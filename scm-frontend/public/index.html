<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCM Assistant — BQBYTE Technologies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #13161e;
      --border:     #1f2530;
      --accent:     #00c2a8;
      --accent-dim: #00c2a820;
      --text:       #dce3ed;
      --muted:      #5a6478;
      --user-bg:    #1a2235;
      --bot-bg:     #131920;
      --error:      #ff4d6d;
      --font-body:  'Inter', sans-serif;
      --font-mono:  'IBM Plex Mono', monospace;
      --radius:     12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .logo svg { display: block; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 86%;
      gap: 4px;
    }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }
    .msg.error { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user  .bubble { background: var(--user-bg); border: 1px solid var(--border); color: var(--text); border-bottom-right-radius: 3px; }
    .msg.bot   .bubble { background: var(--bot-bg);  border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 3px; }
    .msg.error .bubble { background: #1a0a10; border: 1px solid var(--error); color: var(--error); font-size: 13px; border-bottom-left-radius: 3px; }

    .meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 48px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #input::placeholder { color: var(--muted); }
    #input:focus { border-color: var(--accent); }

    #send-btn {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:active:not(:disabled) { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Welcome message ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      pointer-events: none;
      user-select: none;
    }

    .welcome-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--accent-dim);
      border: 1px solid var(--accent)44;
      display: grid;
      place-items: center;
    }

    .welcome h2 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }

    .welcome p {
      font-size: 13px;
      max-width: 340px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      pointer-events: all;
      user-select: text;
      margin-top: 8px;
    }

    .suggestion {
      font-size: 12px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-family: var(--font-mono);
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Latency badge ── */
    .latency {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
      padding: 0 4px;
    }

    @media (max-width: 480px) {
      header { padding: 14px 16px; }
      #messages { padding: 16px 12px; }
      .input-row { padding: 12px 12px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 6h14M3 10h10M3 14h7" stroke="#000" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>SCM Assistant</h1>
      <p>BQBYTE Technologies · Supply Chain Intelligence</p>
    </div>
    <div class="status-dot">
      <span class="dot"></span>
      <span>Live</span>
    </div>
  </header>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#00c2a8" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M2 17l10 5 10-5" stroke="#00c2a8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12l10 5 10-5" stroke="#00c2a8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>What do you want to know?</h2>
      <p>Ask me about suppliers, purchase orders, risk levels, OTD rates, compliance scores, or any supply chain data.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="useSuggestion(this)">Which suppliers have high defect rates?</button>
        <button class="suggestion" onclick="useSuggestion(this)">Show me high-risk POs</button>
        <button class="suggestion" onclick="useSuggestion(this)">Suppliers with low OTD rate</button>
        <button class="suggestion" onclick="useSuggestion(this)">Top compliance scores</button>
      </div>
    </div>
  </div>

  <div class="input-row">
    <textarea
      id="input"
      placeholder="Ask about suppliers, POs, risk levels…"
      rows="1"
      autocomplete="off"
      spellcheck="true"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── PUT YOUR FASTAPI BACKEND URL HERE ──────────────────────────────────────
  // This is the Render service running main__1_.py (the FastAPI backend).
  // It is NOT the same as this frontend service.
  // Example: "https://scm-assistant-bot-1ex0.onrender.com"
  // Open that URL + "/health" in a browser — if you see {"status":"ok"} it's correct.
  const BACKEND_URL = "https://scm-assistant-bot-1ex0.onrender.com";
  // ───────────────────────────────────────────────────────────────────────────

  const TIMEOUT_MS  = 120000; // 120s — Ollama gemma4:31b can be slow
  const messagesEl  = document.getElementById("messages");
  const inputEl     = document.getElementById("input");
  const sendBtn     = document.getElementById("send-btn");
  const welcomeEl   = document.getElementById("welcome");

  let isLoading = false;
  let coldStartTimer = null;

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  // Send on Enter (Shift+Enter = newline)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function useSuggestion(btn) {
    inputEl.value = btn.textContent;
    inputEl.dispatchEvent(new Event("input"));
    sendMessage();
  }

  function hideWelcome() {
    if (welcomeEl) welcomeEl.style.display = "none";
  }

  function appendMessage(role, text, meta = null) {
    hideWelcome();
    const wrapper = document.createElement("div");
    wrapper.className = `msg ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrapper.appendChild(bubble);

    if (meta) {
      const m = document.createElement("div");
      m.className = "meta";
      m.textContent = meta;
      wrapper.appendChild(m);
    }

    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  function showTyping(hint = null) {
    hideWelcome();
    const wrapper = document.createElement("div");
    wrapper.className = "msg bot";
    wrapper.id = "typing";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `
      <div class="typing-dots"><span></span><span></span><span></span></div>
      ${hint ? `<div id="typing-hint" style="font-size:12px;color:var(--muted);margin-top:8px;">${hint}</div>` : ''}
    `;
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function updateTypingHint(text) {
    const hint = document.getElementById("typing-hint");
    if (hint) hint.textContent = text;
    else {
      const bubble = document.querySelector("#typing .bubble");
      if (bubble) {
        const d = document.createElement("div");
        d.id = "typing-hint";
        d.style = "font-size:12px;color:var(--muted);margin-top:8px;";
        d.textContent = text;
        bubble.appendChild(d);
      }
    }
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
    if (coldStartTimer) { clearTimeout(coldStartTimer); coldStartTimer = null; }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Fetch with timeout using AbortController
  async function fetchWithTimeout(url, options, timeoutMs) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(timer);
      return res;
    } catch (err) {
      clearTimeout(timer);
      throw err;
    }
  }

  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    appendMessage("user", question);
    showTyping("Contacting backend…");

    // After 8s show cold-start warning (free tier spins down)
    coldStartTimer = setTimeout(() => {
      updateTypingHint("Backend is waking up (free tier cold start — up to 50s). Please wait…");
    }, 8000);

    // After 40s update hint again
    const hint2 = setTimeout(() => {
      updateTypingHint("Still waiting… Ollama gemma4:31b can take 60-120s. Hang tight.");
    }, 40000);

    try {
      const res = await fetchWithTimeout(
        `${BACKEND_URL}/chat`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, top_k: 6 }),
        },
        TIMEOUT_MS
      );

      clearTimeout(hint2);
      removeTyping();

      if (!res.ok) {
        let detail = `HTTP ${res.status}`;
        try {
          const errJson = await res.json();
          detail = errJson.detail || detail;
        } catch (_) {}

        if (res.status === 0 || res.status === 503) {
          appendMessage("error",
            `Backend is down or still starting up (${detail}). ` +
            `Wait 60s and try again — free Render services sleep after inactivity.`
          );
        } else {
          appendMessage("error", `Backend error: ${detail}`);
        }
        return;
      }

      const data = await res.json();
      const answer  = data.answer || "No answer returned.";
      const sources = data.sources_used ?? "—";
      const latency = data.latency_s != null ? `${data.latency_s}s` : null;
      const meta    = latency
        ? `${sources} source${sources !== 1 ? "s" : ""} · ${latency}`
        : `${sources} source${sources !== 1 ? "s" : ""}`;

      appendMessage("bot", answer, meta);

    } catch (err) {
      clearTimeout(hint2);
      removeTyping();

      if (err.name === "AbortError") {
        appendMessage("error",
          "Request timed out after 120s. The backend may be overloaded or the model is too slow. Try again."
        );
      } else if (err.name === "TypeError") {
        // Most common cause: CORS block OR backend is fully down
        appendMessage("error",
          `Cannot reach the backend at ${BACKEND_URL}.\n\n` +
          `Possible causes:\n` +
          `1. Backend service is sleeping — open ${BACKEND_URL}/health in a new tab to wake it, then try again.\n` +
          `2. The BACKEND_URL in index.html is wrong — check your Render dashboard for the correct FastAPI service URL.\n` +
          `3. CORS issue — make sure the FastAPI backend has allow_origins=["*"].`
        );
      } else {
        appendMessage("error", `Unexpected error: ${err.message}`);
      }
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // On load: silently ping /health to wake the backend before user types
  (async () => {
    try {
      await fetchWithTimeout(`${BACKEND_URL}/health`, { method: "GET" }, 30000);
    } catch (_) {
      // silent — just a warm-up ping
    }
  })();
</script>
</body>
</html>
